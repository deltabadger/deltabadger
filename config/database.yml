default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
    # See production block: primary is shared by the in-Puma Solid Queue workers.
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
    # headroom for DcaIndex parallel candle fetches (CANDLE_FETCH_THREADS)
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 6 %>
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
    # See production block: primary is shared by the in-Puma Solid Queue workers.
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate
    # headroom for DcaIndex parallel candle fetches (CANDLE_FETCH_THREADS)
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 6 %>
  cable:
    <<: *default
    database: storage/test_cable.sqlite3
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_PATH") { "storage/production.sqlite3" } %>
    # Headroom for the in-Puma Solid Queue workers (SOLID_QUEUE_IN_PUMA=true), which
    # share this pool with the web thread. Without it the pool is just RAILS_MAX_THREADS
    # (=1 on hosted containers) and the ~30s daily stock-sync job starves /health-check.
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
    pragmas:
      cache_size: -1000
  queue:
    <<: *default
    database: <%= ENV.fetch("QUEUE_DATABASE_PATH") { "storage/production_queue.sqlite3" } %>
    migrations_paths: db/queue_migrate
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 %>
    pragmas:
      cache_size: -1000
  cache:
    <<: *default
    database: <%= ENV.fetch("CACHE_DATABASE_PATH") { "storage/production_cache.sqlite3" } %>
    migrations_paths: db/cache_migrate
    # headroom for DcaIndex parallel candle fetches (CANDLE_FETCH_THREADS)
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 6 %>
    pragmas:
      cache_size: -1000
  cable:
    <<: *default
    database: <%= ENV.fetch("CABLE_DATABASE_PATH") { "storage/production_cable.sqlite3" } %>
    migrations_paths: db/cable_migrate
    pragmas:
      cache_size: -1000
