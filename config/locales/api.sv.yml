sv:
    bot:
        api:
            public_key_label: API-nyckel
            private_key_label: API-hemlighet
            whitelist_ip_fallback_html: 'IP-adressen till maskinen där Deltabadger är installerad. Om den körs på en server, använd serverns publika IP. Om det är din lokala dator <a href="https://whatismyipaddress.com" target="_blank">kontrollera din IP här</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Logga in på ditt %{exchange_link}-konto.'
                    -   text_html: 'Gå till <a href="https://www.binance.com/en/my/settings/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Klicka på <b class="pbutton">Create API</b>.'
                    -   text_html: 'Välj <b class="pbutton">System generated</b>.'
                    -   text_html: 'Namnge dina nycklar (t.ex. "deltabadger") och genomför säkerhetsverifieringen om det behövs.'
                    -   text_html: 'Klicka på <b class="pbutton">Edit restrictions</b> i övre högra hörnet på nyckelrutan.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: vitlista %{whitelist_ip}.<br><strong>⚠️ Viktigt:</strong> Gör detta först för att aktivera nästa steg."
                            -   text_html: "Bocka i:<br>☑️ <b>Enable Reading</b><br>☑️ <b>Enable Spot & Margin Trading</b>.<br><strong>⚠️ Viktigt:</strong> Nycklarna fungerar inte om du lägger till fler behörigheter."
                    -   text_html: 'Klicka på <b>Save</b> och genomför säkerhetsverifieringen om det behövs.'
                    -   text_html: 'Kopiera och klistra in dina nya API-nycklar ovan.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Logga in på ditt %{exchange_link}-konto.'
                    -   text_html: 'Välj fliken <b>More</b> i vänstra sidofältet.'
                    -   text_html: 'Välj <b>Advanced API</b>.'
                    -   text_html: 'Klicka på <b>Create your API key</b>. Om du inte hittar det, gå direkt via <a href="https://www.coinbase.com/settings/api">den här länken</a>.'
                    -   text_html: 'Under fliken <b>API keys</b>, klicka på <b>Create API key</b>.'
                    -   text_html: 'Konfigurera i dialogrutan:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Ge ett valfritt namn, <b>Deltabadger</b> fungerar bra för att känna igen den senare.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, eller den portfölj du vill att Deltabadger ska ha åtkomst till om du inte använder Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (skrivskyddad)'
                                    -   text_html: '<b>Trade</b> (utför affärer åt dig)<br><strong>⚠️ Viktigt:</strong> Nycklarna fungerar inte om du lägger till fler behörigheter.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Vitlista %{whitelist_ip}.'
                    -   text_html: 'Klicka på <b>Create & download</b> och slutför tvåstegsverifieringen.'
                    -   text_html: 'Kopiera och klistra in dina nya API-nycklar i formuläret ovan.'
                private_key: 'Secret'
                public_key: 'API key ID'
            kraken:
                instructions:
                    -   text_html: 'Logga in på ditt %{exchange_link}-konto.'
                    -   text_html: 'I användarmenyn, gå till <b>Settings</b> → <b>Connections & API</b>.'
                    -   text_html: 'Klicka på <b>Create API key</b>.'
                    -   text_html: 'Ange behörigheter för:'
                        sub_instructions:
                            -   text_html: 'Funds permissions:'
                                sub_instructions:
                                    -   text_html: '<b>Query</b>'
                            -   text_html: 'Order and Trades:'
                                sub_instructions:
                                    -   text_html: '<b>Query open orders & trades</b>'
                                    -   text_html: '<b>Query closed orders & trades</b>'
                                    -   text_html: '<b>Create & modify orders</b>'
                                    -   text_html: '<b>Cancel & close orders</b><br><strong>⚠️ Viktigt:</strong> Nycklarna fungerar inte om du lägger till fler behörigheter.'
                            -   text_html: 'IP address restriction:'
                                sub_instructions:
                                    -   text_html: '🔘 Vitlista %{whitelist_ip}.'
                    -   text_html: 'Klicka på <b>Generate key</b>.'
                    -   text_html: 'Kopiera och klistra in dina nya API-nycklar i formuläret ovan.'
                private_key: 'Private Key'
                public_key: 'API Key'
            bitget:
                instructions:
                    -   text_html: 'Logga in på ditt %{exchange_link}-konto.'
                    -   text_html: 'Gå till <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Klicka på <b>Create API Key</b>.'
                    -   text_html: 'Välj <b>System generated</b>.'
                    -   text_html: 'Namnge din nyckel (t.ex. "Deltabadger") och ange en <b>Passphrase</b>.'
                    -   text_html: 'Ange behörigheter:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Viktigt:</strong> Aktivera inte Withdraw- eller Futures-behörigheter.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Vitlista %{whitelist_ip}.'
                    -   text_html: 'Klicka på <b>Next</b> och slutför verifieringen.'
                    -   text_html: 'Kopiera och klistra in din API Key, Secret Key och Passphrase i formuläret ovan.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Logga in på ditt %{exchange_link}-konto.'
                    -   text_html: 'Gå till <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Klicka på <b>Create API</b>.'
                    -   text_html: 'Namnge din nyckel (t.ex. "Deltabadger") och ange en <b>Passphrase</b>.'
                    -   text_html: 'Ange behörigheter:'
