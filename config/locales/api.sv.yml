                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Vitlista %{whitelist_ip}.'
                    -   text_html: 'Klicka på <b>Confirm</b> och slutför verifieringen.'
                    -   text_html: 'Kopiera och klistra in din API Key, Secret Key och Passphrase i formuläret ovan.'
                private_key: 'API Secret'
                public_key: 'API Key'
