fr:
    bot:
        api:
            public_key_label: Clé API
            private_key_label: Secret API
            whitelist_ip_fallback_html: "l'adresse IP de la machine où Deltabadger est installé. Si vous utilisez un serveur, utilisez l'IP publique du serveur. Si c'est votre ordinateur personnel, <a href=\"https://whatismyipaddress.com\" target=\"_blank\">vérifiez votre IP ici</a>"
            binance: &binance_config
                instructions:
                    -   text_html: 'Connectez-vous à votre compte %{exchange_link}.'
                    -   text_html: 'Allez dans <a href="https://www.binance.com/fr/my/settings/api-management"><b>Compte</b> → <b>Gestion des API</b></a>.'
                    -   text_html: 'Cliquez sur <b class="pbutton">Créer une API</b>.'
                    -   text_html: 'Sélectionnez <b class="pbutton">Généré par le système</b>.'
                    -   text_html: 'Étiquetez vos clés (par exemple "deltabadger") et passez la vérification de sécurité si nécessaire.'
                    -   text_html: 'Cliquez sur <b class="pbutton">Modifier les restrictions</b> dans le coin supérieur droit de la tuile des clés.'
                        sub_instructions:
                            -   text_html: "🔘 Restreindre l'accès aux adresses IP de confiance uniquement : ajoutez %{whitelist_ip}.<br><strong>⚠️ Important :</strong> Faites ceci en premier pour activer l'étape suivante."
                            -   text_html: "Cochez:<br>☑️ <b>Permettre la lecture</b><br>☑️ <b>Activer le trading Spot et sur marge</b>.<br><strong>⚠️ Important :</strong> Les clés ne fonctionneront pas si vous ajoutez plus d'autorisations."
                    -   text_html: 'Cliquez sur <b>Enregistrer</b> et passez la vérification de sécurité si nécessaire.'
                    -   text_html: 'Copiez et collez vos nouvelles clés API ci-dessus.'
                private_key: 'Clé Secrète'
                public_key: 'Clé API'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Connectez-vous à votre compte %{exchange_link}.'
                    -   text_html: 'Sélectionnez l''onglet <b>Plus</b> dans la barre latérale gauche.'
                    -   text_html: 'Sélectionnez <b>API d''Advanced</b>.'
                    -   text_html: 'Cliquez sur <b>Créer votre clé API</b>. Si vous ne la trouvez pas, allez directement <a href="https://www.coinbase.com/settings/api">ici</a>.'
                    -   text_html: 'Dans l''onglet <b>Clés API</b>, cliquez sur le bouton <b>Créer une clé API</b>.'
                    -   text_html: 'Dans la boîte de dialogue contextuelle, configurez :'
                        sub_instructions:
                            -   text_html: 'Nom de la clé API'
                                sub_instructions:
                                    -   text_html: 'Donnez votre nom préféré, <b>Deltabadger</b> est bon pour la reconnaître plus tard.'
                            -   text_html: 'Mes actifs'
                                sub_instructions:
                                    -   text_html: '<b>Défaut</b>, ou le portefeuille auquel vous souhaitez que Deltabadger ait accès si vous n''utilisez pas les Portefeuilles Coinbase.'
                                    -   text_html: '<b>View</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Important :</strong> Les clés ne fonctionneront pas si vous ajoutez plus d''autorisations.'
                            -   text_html: 'Liste blanche d''adresses IP'
                                sub_instructions:
                                    -   text_html: '🔘 Ajoutez %{whitelist_ip}.'
                    -   text_html: 'Cliquez sur <b>Créer et télécharger</b> et terminez la vérification en 2 étapes.'
                    -   text_html: 'Copiez et collez vos nouvelles clés API dans le formulaire ci-dessus.'
                private_key: 'Clé privée'
                public_key: 'Nom de la clé API'
            kraken:
                instructions:
                    -   text_html: 'Connectez-vous à votre compte %{exchange_link}.'
                    -   text_html: 'Dans le menu utilisateur, allez dans <b>Paramètres</b> → <b>Connexions et API</b>.'
                    -   text_html: 'Appuyez sur <b>Créer une clé API</b>.'
                    -   text_html: 'Définissez les permissions pour'
                        sub_instructions:
                            -   text_html: 'Autorisations des fonds'
                                sub_instructions:
                                    -   text_html: '<b>Requête</b>'
                            -   text_html: 'Ordres et Transactions'
                                sub_instructions:
                                    -   text_html: '<b>Consulter les ordres et transactions ouverts</b>'
                                    -   text_html: '<b>Consulter les ordres et les transactions fermés</b>'
                                    -   text_html: '<b>Créer et modifier des ordres</b>'
                                    -   text_html: '<b>Annuler et clôturer les ordres</b><br><strong>⚠️ Important :</strong> Les clés ne fonctionneront pas si vous ajoutez plus d''autorisations.'
                            -   text_html: 'Restriction d''adresse IP'
                                sub_instructions:
                                    -   text_html: '🔘 Ajoutez %{whitelist_ip}.'
                    -   text_html: 'Appuyez sur <b>Générer la Clé</b>.'
                    -   text_html: 'Copiez et collez vos nouvelles clés API dans le formulaire ci-dessus.'
                private_key: 'Clé privée'
                public_key: 'Clé API'
            bitget:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Select <b>System generated</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Next</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>General</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bybit:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bybit.com/app/user/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create New Key</b>.'
                    -   text_html: 'Select <b>System-generated API Keys</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read-Only</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Derivatives permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Submit</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            mexc:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.mexc.com/user/openapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View Order Details</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'Link IP Address:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'Secret Key'
                public_key: 'Access Key'
            gemini:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://exchange.gemini.com/settings/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Create a New API Key</b>.'
                    -   text_html: 'Set the key scope to <b>Primary</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Order Placement</b>'
                            -   text_html: '☑️ <b>Order Status</b>'
                            -   text_html: '☑️ <b>Account Balance</b><br><strong>⚠️ Important:</strong> Do not enable Fund Management or Withdrawal permissions.'
                    -   text_html: 'Click <b>Create API Key</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bitvavo:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://account.bitvavo.com/user/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Generate new key</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Generate</b>.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
