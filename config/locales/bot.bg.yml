        utils:
            mkt_cap_adjusted_html: "Коригирано по пазарна капитализация"
            mkt_cap_adjusted_info_html: |
                <p><b>Пазарна капитализация</b> е начин да се измери размерът и стойността на една криптовалута. Изчислява се като общият брой монети се умножи по текущата цена на една монета. Във вашия бот монетата с по-голяма пазарна капитализация получава по-голям дял от инвестицията.</p>
                <p><b>Пример:</b></p>
                <p><b>Монета A:</b> съществуват 2 милиона монети, всяка по 10 $. Пазарна капитализация = 2M × 10 $ = 20M $.</p>
                <p><b>Монета B:</b> съществува 1 милион монети, всяка по 1 $. Пазарна капитализация = 1M × 1 $ = 1M $.</p>
                <p>Ако инвестирате 100 $, ботът ги разпределя пропорционално на пазарната капитализация: 95,2 $ в Монета A, 4,8 $ в Монета B.</p>
                <p>Ако обаче цената на Монета B се повиши до 3 $, пазарната й капитализация става 3M $. Следващите 100 $ ще се разпределят: 87 $ в Монета A и 13 $ в Монета B.</p>
