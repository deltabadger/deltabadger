pl:
    bot:
        api:
            public_key_label: Klucz API
            private_key_label: Sekretny klucz API
            whitelist_ip_fallback_html: 'adres IP maszyny, na której zainstalowany jest Deltabadger. Jeśli to serwer, użyj publicznego IP serwera. Jeśli to twój komputer lokalny, <a href="https://whatismyipaddress.com" target="_blank">sprawdź swoje IP tutaj</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Zaloguj się na swoje konto %{exchange_link}.'
                    -   text_html: 'Przejdź do <a href="https://www.binance.com/pl/my/settings/api-management"><b>Konto</b> → <b>Ustawienia API</b></a>.'
                    -   text_html: 'Kliknij <b class="pbutton">Utworzenie klucza API</b>.'
                    -   text_html: 'Wybierz <b class="pbutton">System wygenerował</b>.'
                    -   text_html: 'Oznacz swoje klucze (np. "deltabadger") i w razie potrzeby przejdź weryfikację bezpieczeństwa.'
                    -   text_html: 'Kliknij <b class="pbutton">Zmień uprawnienia</b> w prawym górnym rogu kafelka kluczy.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: dodaj %{whitelist_ip}.<br><strong>⚠️ Ważne:</strong> Zrób to najpierw, aby włączyć następny krok."
                            -   text_html: "Zaznacz:<br>☑️ <b>Włącz Odczyt</b><br>☑️ <b>Włącz Handel Spot i Margin</b>.<br><strong>⚠️ Ważne:</strong> Klucze nie będą działać, jeśli dodasz więcej uprawnień."
                    -   text_html: 'Kliknij <b>Zapisz</b> i w razie potrzeby przejdź weryfikację bezpieczeństwa.'
                    -   text_html: 'Skopiuj i wklej swoje nowe klucze API powyżej.'
                private_key: 'Klucz Tajny'
                public_key: 'Klucz API'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Zaloguj się na swoje konto %{exchange_link}.'
                    -   text_html: 'Wybierz zakładkę <b>More</b> z lewego paska bocznego.'
                    -   text_html: 'Wybierz <b>Advanced API</b>.'
                    -   text_html: 'Kliknij <b>Create your API key</b>. Jeśli nie możesz go znaleźć, przejdź bezpośrednio <a href="https://www.coinbase.com/settings/api">tutaj</a>.'
                    -   text_html: 'Wybierz zakładkę <b>API keys</b>, kliknij przycisk <b>Create API key</b>.'
                    -   text_html: 'W wyskakującym oknie dialogowym skonfiguruj:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Nadaj preferowaną nazwę, <b>Deltabadger</b> jest dobra, aby go później rozpoznać.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, or the portfolio you want Deltabadger to have access to if not using Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Ważne:</strong> Klucze nie będą działać, jeśli dodasz więcej uprawnień.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Dodaj %{whitelist_ip}.'
                    -   text_html: 'Kliknij <b>Create & download</b> i ukończ weryfikację 2-etapową.'
                    -   text_html: 'Skopiuj i wklej swoje nowe klucze API do powyższego formularza.'
                private_key: 'Secret'
                public_key: 'API key ID'
            kraken:
                instructions:
                    -   text_html: 'Zaloguj się na swoje konto %{exchange_link}.'
                    -   text_html: 'W menu użytkownika przejdź do <b>Ustawienia</b> → <b>Połączenia i API</b>.'
                    -   text_html: 'Naciśnij <b>Utwórz klucz API</b>.'
                    -   text_html: 'Ustaw uprawnienia dla:'
                        sub_instructions:
                            -   text_html: 'Uprawnienia funduszy:'
                                sub_instructions:
                                    -   text_html: '<b>Zapytanie</b>'
                            -   text_html: 'Zlecenia i transakcje:'
                                sub_instructions:
                                    -   text_html: '<b>Zapytanie o otwarte zlecenia i transakcje</b>'
                                    -   text_html: '<b>Zapytanie o zamknięte zlecenia i transakcje</b>'
                                    -   text_html: '<b>Twórz i modyfikuj zlecenia</b>'
                                    -   text_html: '<b>Anuluj i zamknij zlecenia</b><br><strong>⚠️ Ważne:</strong> Klucze nie będą działać, jeśli dodasz więcej uprawnień.'
                            -   text_html: 'IP address restriction:'
                                sub_instructions:
                                    -   text_html: '🔘 Dodaj %{whitelist_ip}.'
                    -   text_html: 'Naciśnij <b>Wygeneruj klucz</b>.'
                    -   text_html: 'Skopiuj i wklej swoje nowe klucze API do powyższego formularza.'
                private_key: 'Klucz prywatny'
                public_key: 'Klucz API'
            bitget:
                instructions:
                    -   text_html: 'Zaloguj się na swoje konto %{exchange_link}.'
                    -   text_html: 'Przejdź do <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Kliknij <b>Create API Key</b>.'
                    -   text_html: 'Wybierz <b>System generated</b>.'
                    -   text_html: 'Oznacz klucz (np. "Deltabadger") i ustaw <b>Passphrase</b>.'
                    -   text_html: 'Ustaw uprawnienia:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Ważne:</strong> Nie włączaj uprawnień do wypłat ani Futures.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Dodaj %{whitelist_ip}.'
                    -   text_html: 'Kliknij <b>Next</b> i przejdź weryfikację.'
                    -   text_html: 'Skopiuj i wklej API Key, Secret Key i Passphrase do formularza powyżej.'
                private_key: 'Secret Key'
                public_key: 'API Key'
