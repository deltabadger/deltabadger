ru:
    bot:
        api:
            public_key_label: API-ключ
            private_key_label: Секретный ключ API
            whitelist_ip_fallback_html: 'IP-адрес машины, на которой установлен Deltabadger. Если это сервер, используйте публичный IP сервера. Если это ваш локальный компьютер, <a href="https://whatismyipaddress.com" target="_blank">проверьте свой IP здесь</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Войдите в свою учетную запись %{exchange_link}.'
                    -   text_html: 'Перейдите в <a href="https://www.binance.com/ru/my/settings/api-management"><b>Аккаунт</b> → <b>Управление API</b></a>.'
                    -   text_html: 'Нажмите <b class="pbutton">Создать API</b>.'
                    -   text_html: 'Выберите <b class="pbutton">Сгенерировано системой</b>.'
                    -   text_html: 'Добавьте метку для ваших ключей (например, "deltabadger") и пройдите проверку безопасности, если необходимо.'
                    -   text_html: 'Нажмите <b class="pbutton">Редактировать ограничения</b> в правом верхнем углу блока ключей.'
                        sub_instructions:
                            -   text_html: "🔘 Разрешить доступ только доверенным IP-адресам: добавьте %{whitelist_ip}.<br><strong>⚠️ Важно:</strong> Сделайте это в первую очередь, чтобы активировать следующий шаг."
                            -   text_html: "Отметьте:<br>☑️ <b>Разрешить чтение</b><br>☑️ <b>Включить спотовую и маржинальную торговлю</b>.<br><strong>⚠️ Важно:</strong> Ключи не будут работать, если вы добавите больше разрешений."
                    -   text_html: 'Нажмите <b>Сохранить</b> и пройдите проверку безопасности, если необходимо.'
                    -   text_html: 'Скопируйте и вставьте ваши новые ключи API выше.'
                private_key: 'Секретный ключ'
                public_key: 'Ключ API'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Войдите в свою учетную запись %{exchange_link}.'
                    -   text_html: 'Выберите вкладку <b>More</b> на левой боковой панели.'
                    -   text_html: 'Выберите <b>Advanced API</b>.'
                    -   text_html: 'Нажмите <b>Create your API key</b>. Если вы не можете его найти, перейдите напрямую <a href="https://www.coinbase.com/settings/api">сюда</a>.'
                    -   text_html: 'В вкладке <b>API keys</b> нажмите <b>Create API key</b>.'
                    -   text_html: 'Во всплывающем диалоговом окне настройте:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Дайте предпочтительное имя, <b>Deltabadger</b> хорошо подходит для того, чтобы узнать его позже.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, или портфель, к которому вы хотите предоставить доступ Deltabadger, если не используете портфели Coinbase.'
                                    -   text_html: '<b>View</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Важно:</strong> Ключи не будут работать, если вы добавите больше разрешений.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Добавьте %{whitelist_ip}.'
                    -   text_html: 'Нажмите <b>Create & download</b> и завершите двухэтапную проверку.'
                    -   text_html: 'Скопируйте и вставьте ваши новые ключи API в форму выше.'
                private_key: 'Secret'
                public_key: 'API key ID'
            kraken:
                instructions:
                    -   text_html: 'Войдите в свою учетную запись %{exchange_link}.'
                    -   text_html: 'В меню пользователя перейдите в <b>Настройки</b> → <b>Подключения и API</b>.'
                    -   text_html: 'Нажмите <b>Создать ключ API</b>.'
                    -   text_html: 'Установите разрешения для:'
                        sub_instructions:
                            -   text_html: 'Разрешения для средств:'
                                sub_instructions:
                                    -   text_html: '<b>Запрос</b>'
                            -   text_html: 'Ордера и сделки:'
                                sub_instructions:
                                    -   text_html: '<b>Запросить открытые ордера и сделки</b>'
                                    -   text_html: '<b>Запросить закрытые ордера и сделки</b>'
                                    -   text_html: '<b>Создать и изменить ордера</b>'
                                    -   text_html: '<b>Отменить и закрыть ордера</b><br><strong>⚠️ Важно:</strong> Ключи не будут работать, если вы добавите больше разрешений.'
                            -   text_html: 'Ограничение IP-адреса:'
                                sub_instructions:
                                    -   text_html: '🔘 Добавьте %{whitelist_ip}.'
                    -   text_html: 'Нажмите <b>Сгенерировать ключ</b>.'
                    -   text_html: 'Скопируйте и вставьте ваши новые ключи API в форму выше.'
                private_key: 'Закрытый ключ'
                public_key: 'Ключ API'
            bitget:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Select <b>System generated</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Next</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>General</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bybit:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bybit.com/app/user/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create New Key</b>.'
                    -   text_html: 'Select <b>System-generated API Keys</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read-Only</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Derivatives permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Submit</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            mexc:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.mexc.com/user/openapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View Order Details</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'Link IP Address:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'Secret Key'
                public_key: 'Access Key'
            gemini:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://exchange.gemini.com/settings/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Create a New API Key</b>.'
                    -   text_html: 'Set the key scope to <b>Primary</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Order Placement</b>'
                            -   text_html: '☑️ <b>Order Status</b>'
                            -   text_html: '☑️ <b>Account Balance</b><br><strong>⚠️ Important:</strong> Do not enable Fund Management or Withdrawal permissions.'
                    -   text_html: 'Click <b>Create API Key</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bitvavo:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://account.bitvavo.com/user/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Generate new key</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Generate</b>.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
