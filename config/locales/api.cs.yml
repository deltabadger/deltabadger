cs:
    bot:
        api:
            whitelist_ip_fallback_html: 'IP adresu počítače, na kterém je Deltabadger nainstalován. Pokud běží na serveru, použijte veřejnou IP serveru. Pokud jde o váš lokální počítač, <a href="https://whatismyipaddress.com" target="_blank">zjistěte svou IP zde</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Přihlaste se ke svému účtu na %{exchange_link}.'
                    -   text_html: 'Přejděte na <a href="https://www.binance.com/en/my/settings/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Klikněte na <b class="pbutton">Create API</b>.'
                    -   text_html: 'Vyberte <b class="pbutton">System generated</b>.'
                    -   text_html: 'Pojmenujte klíče (např. „deltabadger") a v případě potřeby projděte bezpečnostním ověřením.'
                    -   text_html: 'Klikněte na <b class="pbutton">Edit restrictions</b> v pravém horním rohu dlaždice s klíči.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: přidejte %{whitelist_ip}.<br><strong>⚠️ Důležité:</strong> Proveďte nejprve tento krok, aby se zpřístupnil následující."
                            -   text_html: "Zaškrtněte:<br>☑️ <b>Enable Reading</b><br>☑️ <b>Enable Spot & Margin Trading</b>.<br><strong>⚠️ Důležité:</strong> Klíče nebudou fungovat, pokud povolíte další oprávnění."
                    -   text_html: 'Klikněte na <b>Save</b> a v případě potřeby projděte bezpečnostním ověřením.'
                    -   text_html: 'Zkopírujte a vložte své nové API klíče výše.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Přihlaste se ke svému účtu na %{exchange_link}.'
                    -   text_html: 'V levém panelu vyberte záložku <b>More</b>.'
                    -   text_html: 'Vyberte <b>Advanced API</b>.'
                    -   text_html: 'Klikněte na <b>Create your API key</b>. Pokud ji nemůžete najít, přejděte přímo <a href="https://www.coinbase.com/settings/api">sem</a>.'
                    -   text_html: 'Na záložce <b>API keys</b> klikněte na <b>Create API key</b>.'
                    -   text_html: 'V dialogovém okně nastavte:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Zvolte libovolný název, <b>Deltabadger</b> se hodí pro snadné rozpoznání.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, nebo portfolio, ke kterému chcete Deltabadger přístup, pokud nepoužíváte Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (pouze čtení)'
                                    -   text_html: '<b>Trade</b> (provádění obchodů za vás)<br><strong>⚠️ Důležité:</strong> Klíče nebudou fungovat, pokud povolíte další oprávnění.'
