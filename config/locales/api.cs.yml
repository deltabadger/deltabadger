                                    -   text_html: '🔘 Přidejte %{whitelist_ip}.'
                    -   text_html: 'Klikněte na <b>Create & download</b> a dokončete dvoufázové ověření.'
                    -   text_html: 'Zkopírujte a vložte své nové API klíče do formuláře výše.'
