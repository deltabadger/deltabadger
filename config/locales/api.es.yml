es:
    bot:
        api:
            public_key_label: Clave API
            private_key_label: Secret API
            whitelist_ip_fallback_html: 'la dirección IP de la máquina donde está instalado Deltabadger. Si está en un servidor, usa la IP pública del servidor. Si es tu ordenador personal, <a href="https://whatismyipaddress.com" target="_blank">comprueba tu IP aquí</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Inicia sesión en tu cuenta de %{exchange_link}.'
                    -   text_html: 'Ve a <a href="https://www.binance.com/es/my/settings/api-management"><b>Cuenta</b> → <b>Gestión de API</b></a>.'
                    -   text_html: 'Haz clic en <b class="pbutton">Crear API</b>.'
                    -   text_html: 'Selecciona <b class="pbutton">Generada por el sistema</b>.'
                    -   text_html: 'Etiqueta tu clave API (por ejemplo, "deltabadger") y pasa la verificación de seguridad si es necesario.'
                    -   text_html: 'Haz clic en <b class="pbutton">Editar restricciones</b> en la esquina superior derecha del recuadro de claves.'
                        sub_instructions:
                            -   text_html: "🔘 Restringir el acceso a direcciones IP fiables: añade %{whitelist_ip}.<br><strong>⚠️ Importante:</strong> Haz esto primero para habilitar el siguiente paso."
                            -   text_html: "Marca:<br>☑️ <b>Habilitar lectura</b><br>☑️ <b>Habilitar trading de márgenes y spot</b>.<br><strong>⚠️ Importante:</strong> Las claves no funcionarán si añades más permisos."
                    -   text_html: 'Haz clic en <b>Guardar</b> y pasa la verificación de seguridad si es necesario.'
                    -   text_html: 'Copia y pega tus nuevas claves API arriba.'
                private_key: 'Clave Secreta'
                public_key: 'Clave API'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Inicia sesión en tu cuenta de %{exchange_link}.'
                    -   text_html: 'Selecciona la pestaña <b>Ver más</b> en la barra lateral izquierda.'
                    -   text_html: 'Selecciona <b>API de Advanced</b>.'
                    -   text_html: 'Haz clic en <b>Crea tu clave API</b>. Si no puedes encontrarla, ve directamente desde <a href="https://www.coinbase.com/settings/api">aquí</a>.'
                    -   text_html: 'En la pestaña Claves API, haz clic en el botón <b>Crear clave de API</b>.'
                    -   text_html: 'En el cuadro de diálogo emergente, configura:'
                        sub_instructions:
                            -   text_html: 'Apodo de la clave API'
                                sub_instructions:
                                    -   text_html: 'Dale tu nombre preferido, <b>Deltabadger</b> es bueno para reconocerla en el futuro.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Predeterminado</b>, o el portfolio al que quieres que Deltabadger tenga acceso si usas Portfolios de Coinbase.'
                                    -   text_html: '<b>Ver</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Importante:</strong> Las claves no funcionarán si añades más permisos.'
                            -   text_html: 'Lista blanca de IP'
                                sub_instructions:
                                    -   text_html: '🔘 Añade %{whitelist_ip}.'
                    -   text_html: 'Haz clic en <b>Crear y descargar</b> y completa la verificación en 2 pasos.'
                    -   text_html: 'Copia y pega tus nuevas claves API en el formulario de arriba.'
                private_key: 'Clave privada'
                public_key: 'Nombre de la clave de API'
            kraken:
                instructions:
                    -   text_html: 'Inicia sesión en tu cuenta de %{exchange_link}.'
                    -   text_html: 'En el menú de usuario ve a <b>Configuración</b> → <b>Conexiones y API</b>.'
                    -   text_html: 'Haz clic en <b>Crear clave API</b>.'
                    -   text_html: 'Establece permisos para:'
                        sub_instructions:
                            -   text_html: 'Permisos de fondos:'
                        sub_instructions:
                            -   text_html: '<b>Consulta</b>'
                            -   text_html: 'Órdenes y Operaciones:'
                                sub_instructions:
                                    -   text_html: '<b>Consultar Órdenes Abiertas y Operaciones</b>'
                                    -   text_html: '<b>Consultar Órdenes Cerradas y Operaciones</b>'
                                    -   text_html: '<b>Crear y modificar órdenes</b>'
                                    -   text_html: '<b>Cancelar y cerrar órdenes</b><br><strong>⚠️ Importante:</strong> Las claves no funcionarán si añades más permisos.'
                            -   text_html: 'Restricción de dirección IP:'
                                sub_instructions:
                                    -   text_html: '🔘 Añade %{whitelist_ip}.'
                    -   text_html: 'Haz clic en <b>Generar clave</b>.'
                    -   text_html: 'Copia y pega tus nuevas claves API en el formulario de arriba.'
                private_key: 'Clave privada'
                public_key: 'Clave API'
            bitget:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Select <b>System generated</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Next</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>General</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bybit:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bybit.com/app/user/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create New Key</b>.'
                    -   text_html: 'Select <b>System-generated API Keys</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read-Only</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Derivatives permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Submit</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            mexc:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.mexc.com/user/openapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View Order Details</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'Link IP Address:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'Secret Key'
                public_key: 'Access Key'
            gemini:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://exchange.gemini.com/settings/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Create a New API Key</b>.'
                    -   text_html: 'Set the key scope to <b>Primary</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Order Placement</b>'
                            -   text_html: '☑️ <b>Order Status</b>'
                            -   text_html: '☑️ <b>Account Balance</b><br><strong>⚠️ Important:</strong> Do not enable Fund Management or Withdrawal permissions.'
                    -   text_html: 'Click <b>Create API Key</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bitvavo:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://account.bitvavo.com/user/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Generate new key</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Generate</b>.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
