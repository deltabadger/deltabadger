            mkt_cap_adjusted_info_html: |
                <p><b>Κεφαλαιοποίηση</b> είναι ένας τρόπος μέτρησης του μεγέθους ή της αξίας ενός νομίσματος. Υπολογίζεται πολλαπλασιάζοντας τον συνολικό αριθμό νομισμάτων με την τρέχουσα τιμή ενός. Στο bot σου, το νόμισμα με τη μεγαλύτερη κεφαλαιοποίηση παίρνει μεγαλύτερο μερίδιο της επένδυσής σου.</p>
                <p><b>Παράδειγμα:</b></p>
                <p><b>Νόμισμα A:</b> Υπάρχουν 2 εκατομμύρια νομίσματα, αξίας $10 το καθένα. Κεφαλαιοποίηση = 2M × $10 = $20M.</p>
                <p><b>Νόμισμα B:</b> Υπάρχει 1 εκατομμύριο νομίσματα, αξίας $1 το καθένα. Κεφαλαιοποίηση = 1M × $1 = $1M.</p>
                <p>Αν επενδύσεις $100, το bot θα τα μοιράσει αναλογικά με τις κεφαλαιοποιήσεις: $95,2 στο Νόμισμα A, $4,8 στο Νόμισμα B.</p>
                <p>Αν όμως η τιμή του Νομίσματος B ανέβει στα $3, η κεφαλαιοποίησή του γίνεται $3M. Τώρα, τα επόμενα $100 θα κατανεμηθούν $87 στο Νόμισμα A και $13 στο Νόμισμα B.</p>
