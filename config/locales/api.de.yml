de:
    bot:
        api:
            public_key_label: API-Schlüssel
            private_key_label: API-Secret
            whitelist_ip_fallback_html: 'die IP-Adresse der Maschine, auf der Deltabadger installiert ist. Wenn es auf einem Server läuft, verwenden Sie die öffentliche IP des Servers. Wenn es Ihr lokaler Computer ist, <a href="https://whatismyipaddress.com" target="_blank">prüfen Sie Ihre IP hier</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Melden Sie sich bei Ihrem %{exchange_link}-Konto an.'
                    -   text_html: 'Gehen Sie zu <a href="https://www.binance.com/de/my/settings/api-management"><b>Konto</b> → <b>API-Verwaltung</b></a>.'
                    -   text_html: 'Klicken Sie auf <b class="pbutton">API erstellen</b>.'
                    -   text_html: 'Wählen Sie <b class="pbutton">Vom System generiert</b>.'
                    -   text_html: 'Beschriften Sie Ihre Schlüssel (z.B. "deltabadger") und führen Sie bei Bedarf die Sicherheitsüberprüfung durch.'
                    -   text_html: 'Klicken Sie auf <b class="pbutton">Einschränkungen bearbeiten</b> in der oberen rechten Ecke der Schlüsselkachel.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: fügen Sie %{whitelist_ip} hinzu.<br><strong>⚠️ Wichtig:</strong> Führen Sie dies zuerst aus, um den nächsten Schritt zu aktivieren."
                            -   text_html: "Aktivieren Sie:<br>☑️ <b>Leseberechtigung aktivieren</b><br>☑️ <b>Spot- und Margin-Handel aktivieren</b>.<br><strong>⚠️ Wichtig:</strong> Die Schlüssel funktionieren nicht, wenn Sie weitere Berechtigungen hinzufügen."
                    -   text_html: 'Klicken Sie auf <b>Speichern</b> und führen Sie bei Bedarf die Sicherheitsüberprüfung durch.'
                    -   text_html: 'Kopieren und fügen Sie Ihre neuen API-Schlüssel oben ein.'
                private_key: 'Geheimschlüssel'
                public_key: 'API-Schlüssel'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Melden Sie sich bei Ihrem %{exchange_link}-Konto an.'
                    -   text_html: 'Wählen Sie die Registerkarte <b>Mehr</b> in der linken Seitenleiste aus.'
                    -   text_html: 'Wählen Sie <b>Advanced API</b>.'
                    -   text_html: 'Klicken Sie auf <b>API-Schlüssel erstellen</b>. Wenn Sie ihn nicht finden können, gehen Sie direkt von <a href="https://www.coinbase.com/settings/api">hier</a> aus.'
                    -   text_html: 'In der Registerkarte <b>API-Schlüssel</b> klicken Sie auf die Schaltfläche <b>API-Schlüssel erstellen</b>.'
                    -   text_html: 'Im Popup-Dialogfeld konfigurieren Sie:'
                        sub_instructions:
                            -   text_html: 'Spitzname API-Schlüssel'
                                sub_instructions:
                                    -   text_html: 'Geben Sie Ihren bevorzugten Namen ein, <b>Deltabadger</b> ist gut, um ihn später wiederzuerkennen.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Standard</b>, oder das Portfolio, auf das Deltabadger zugreifen soll, wenn Sie keine Coinbase-Portfolios verwenden.'
                                    -   text_html: '<b>View</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Wichtig:</strong> Die Schlüssel funktionieren nicht, wenn Sie weitere Berechtigungen hinzufügen.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Fügen Sie %{whitelist_ip} hinzu.'
                    -   text_html: 'Klicken Sie auf <b>Erstellen und herunterladen</b> und schließen Sie die 2-Schritt-Verifizierung ab.'
                    -   text_html: 'Kopieren und fügen Sie Ihre neuen API-Schlüssel in das obige Formular ein.'
                private_key: 'Privater Schlüssel'
                public_key: 'Name des API-Schlüssels'
            kraken:
                instructions:
                    -   text_html: 'Melden Sie sich bei Ihrem %{exchange_link}-Konto an.'
                    -   text_html: 'Gehen Sie im Benutzermenü zu <b>Einstellungen</b> → <b>Verbindungen & API</b>.'
                    -   text_html: 'Klicken Sie auf <b>API-Schlüssel erstellen</b>.'
                    -   text_html: 'Legen Sie Berechtigungen fest für:'
                        sub_instructions:
                            -   text_html: 'Mittelberechtigungen:'
                                sub_instructions:
                                    -   text_html: '<b>Abfrage</b>'
                            -   text_html: 'Orders und Trades:'
                                sub_instructions:
                                    -   text_html: '<b>Offene Order und Trades abfragen</b>'
                                    -   text_html: '<b>Abfrage geschlossener Order & Trades</b>'
                                    -   text_html: '<b>Orders erstellen und ändern</b>'
                                    -   text_html: '<b>Orders stornieren und schließen</b><br><strong>⚠️ Wichtig:</strong> Die Schlüssel funktionieren nicht, wenn Sie weitere Berechtigungen hinzufügen.'
                            -   text_html: 'IP address restriction:'
                                sub_instructions:
                                    -   text_html: '🔘 Fügen Sie %{whitelist_ip} hinzu.'
                    -   text_html: 'Klicken Sie auf <b>Schlüssel generieren</b>.'
                    -   text_html: 'Kopieren und fügen Sie Ihre neuen API-Schlüssel in das obige Formular ein.'
                private_key: 'Privater Schlüssel'
                public_key: 'API-Schlüssel'
            bitget:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Select <b>System generated</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Next</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>General</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bybit:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bybit.com/app/user/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create New Key</b>.'
                    -   text_html: 'Select <b>System-generated API Keys</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read-Only</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Derivatives permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Submit</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            mexc:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.mexc.com/user/openapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View Order Details</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'Link IP Address:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'Secret Key'
                public_key: 'Access Key'
            gemini:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://exchange.gemini.com/settings/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Create a New API Key</b>.'
                    -   text_html: 'Set the key scope to <b>Primary</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Order Placement</b>'
                            -   text_html: '☑️ <b>Order Status</b>'
                            -   text_html: '☑️ <b>Account Balance</b><br><strong>⚠️ Important:</strong> Do not enable Fund Management or Withdrawal permissions.'
                    -   text_html: 'Click <b>Create API Key</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bitvavo:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://account.bitvavo.com/user/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Generate new key</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Generate</b>.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
