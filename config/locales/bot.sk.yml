            mkt_cap_adjusted_info_html: |
                <p><b>Trhová kapitalizácia</b> je spôsob, ako merať veľkosť a hodnotu kryptomeny. Vypočíta sa vynásobením celkového počtu mincí aktuálnou cenou jednej mince. Vo vašom botovi dostane minca s väčšou trhovou kapitalizáciou väčší podiel z investície.</p>
                <p><b>Príklad:</b></p>
                <p><b>Minca A:</b> existujú 2 milióny mincí, každá za 10 $. Trhová kapitalizácia = 2M × 10 $ = 20M $.</p>
                <p><b>Minca B:</b> existuje 1 milión mincí, každá za 1 $. Trhová kapitalizácia = 1M × 1 $ = 1M $.</p>
                <p>Ak investujete 100 $, bot ich rozdelí úmerne trhovej kapitalizácii: 95,2 $ do Mince A, 4,8 $ do Mince B.</p>
                <p>Ak ale cena Mince B vzrastie na 3 $, jej trhová kapitalizácia bude 3M $. Ďalších 100 $ sa potom rozdelí 87 $ do Mince A a 13 $ do Mince B.</p>
