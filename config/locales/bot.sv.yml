        utils:
            mkt_cap_adjusted_html: "Börsvärdesjusterad"
            mkt_cap_adjusted_info_html: |
                <p><b>Börsvärde</b> är ett sätt att mäta hur stor eller värdefull en kryptovaluta är. Det beräknas genom att multiplicera det totala antalet mynt med priset per mynt. I din bot får myntet med högre börsvärde en större andel av din investering.</p>
                <p><b>Exempel:</b></p>
                <p><b>Mynt A:</b> 2 miljoner mynt finns, vardera värt $10. Börsvärdet blir 2M × $10 = $20M.</p>
                <p><b>Mynt B:</b> 1 miljon mynt finns, vardera värt $1. Börsvärde = 1M × $1 = $1M.</p>
                <p>Om du investerar $100 delar boten upp det proportionellt efter börsvärde: $95,2 till Mynt A, $4,8 till Mynt B.</p>
                <p>Men om Mynt B:s pris stiger till $3 blir dess börsvärde $3M. Då fördelas nästa $100 som $87 till Mynt A och $13 till Mynt B.</p>
