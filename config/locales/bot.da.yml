            mkt_cap_adjusted_html: "Markedsværdijusteret"
            mkt_cap_adjusted_info_html: |
                <p><b>Markedsværdi</b> er en måde at måle, hvor stor eller værdifuld en coin er. Den beregnes ved at gange det samlede antal coins med den aktuelle pris per coin. I din bot får coinen med den største markedsværdi en større andel af din investering.</p>
                <p><b>Eksempel:</b></p>
                <p><b>Coin A:</b> Der findes 2 millioner coins, hver til 10 kr. Markedsværdien er 2M × 10 kr. = 20M kr.</p>
                <p><b>Coin B:</b> Der findes 1 million coins, hver til 1 kr. Markedsværdi = 1M × 1 kr. = 1M kr.</p>
                <p>Hvis du investerer 100 kr., fordeler botten dem proportionelt efter markedsværdi: 95,2 kr. til Coin A, 4,8 kr. til Coin B.</p>
                <p>Men hvis Coin B''s pris stiger til 3 kr., bliver dens markedsværdi 3M kr. Nu vil de næste 100 kr. fordeles med 87 kr. til Coin A og 13 kr. til Coin B.</p>
