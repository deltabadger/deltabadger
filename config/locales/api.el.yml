                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Δώσε ένα όνομα της αρεσκείας σου, <b>Deltabadger</b> είναι καλό για να το αναγνωρίζεις αργότερα.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, ή το portfolio στο οποίο θέλεις να έχει πρόσβαση το Deltabadger αν δεν χρησιμοποιείς Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (μόνο ανάγνωση)'
                                    -   text_html: '<b>Trade</b> (εκτέλεση συναλλαγών για λογαριασμό σου)<br><strong>⚠️ Σημαντικό:</strong> Τα κλειδιά δεν θα λειτουργήσουν αν προσθέσεις περισσότερα δικαιώματα.'
