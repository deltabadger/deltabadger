                                sub_instructions:
                                    -   text_html: '🔘 Πρόσθεσε %{whitelist_ip}.'
                    -   text_html: 'Πάτησε <b>Create & download</b> και ολοκλήρωσε την επαλήθευση δύο βημάτων.'
                    -   text_html: 'Αντέγραψε και επικόλλησε τα νέα κλειδιά API στη φόρμα παραπάνω.'
