el:
    bot:
        api:
            public_key_label: Κλειδί API
            private_key_label: Secret API
            whitelist_ip_fallback_html: 'τη διεύθυνση IP του μηχανήματος όπου είναι εγκατεστημένο το Deltabadger. Αν τρέχει σε server, χρησιμοποίησε τη δημόσια IP του server. Αν είναι ο προσωπικός σου υπολογιστής, <a href="https://whatismyipaddress.com" target="_blank">δες την IP σου εδώ</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Συνδέσου στον λογαριασμό σου στο %{exchange_link}.'
                    -   text_html: 'Πήγαινε στο <a href="https://www.binance.com/en/my/settings/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Πάτησε <b class="pbutton">Create API</b>.'
                    -   text_html: 'Επίλεξε <b class="pbutton">System generated</b>.'
                    -   text_html: 'Δώσε ένα όνομα στα κλειδιά (π.χ. "deltabadger") και ολοκλήρωσε την επαλήθευση ασφαλείας αν χρειαστεί.'
                    -   text_html: 'Πάτησε <b class="pbutton">Edit restrictions</b> στην πάνω δεξιά γωνία του πλαισίου κλειδιών.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: πρόσθεσε %{whitelist_ip}.<br><strong>⚠️ Σημαντικό:</strong> Κάνε αυτό πρώτα για να ενεργοποιηθεί το επόμενο βήμα."
                            -   text_html: "Τσέκαρε:<br>☑️ <b>Enable Reading</b><br>☑️ <b>Enable Spot & Margin Trading</b>.<br><strong>⚠️ Σημαντικό:</strong> Τα κλειδιά δεν θα λειτουργήσουν αν προσθέσεις περισσότερα δικαιώματα."
                    -   text_html: 'Πάτησε <b>Save</b> και ολοκλήρωσε την επαλήθευση ασφαλείας αν χρειαστεί.'
                    -   text_html: 'Αντέγραψε και επικόλλησε τα νέα κλειδιά API παραπάνω.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Συνδέσου στον λογαριασμό σου στο %{exchange_link}.'
                    -   text_html: 'Επίλεξε την καρτέλα <b>More</b> από την αριστερή πλαϊνή μπάρα.'
                    -   text_html: 'Επίλεξε <b>Advanced API</b>.'
                    -   text_html: 'Πάτησε <b>Create your API key</b>. Αν δεν το βρίσκεις, πήγαινε απευθείας <a href="https://www.coinbase.com/settings/api">εδώ</a>.'
