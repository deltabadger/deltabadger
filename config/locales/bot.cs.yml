        utils:
            mkt_cap_adjusted_html: "Upraveno dle tržní kapitalizace"
            mkt_cap_adjusted_info_html: |
                <p><b>Tržní kapitalizace</b> je způsob, jak měřit velikost a hodnotu kryptoměny. Vypočítá se vynásobením celkového počtu mincí aktuální cenou jedné mince. Ve vašem botovi dostane mince s větší tržní kapitalizací větší podíl z investice.</p>
                <p><b>Příklad:</b></p>
                <p><b>Mince A:</b> existují 2 miliony mincí, každá za 10 $. Tržní kapitalizace = 2M × 10 $ = 20M $.</p>
                <p><b>Mince B:</b> existuje 1 milion mincí, každá za 1 $. Tržní kapitalizace = 1M × 1 $ = 1M $.</p>
                <p>Pokud investujete 100 $, bot je rozdělí úměrně tržní kapitalizaci: 95,2 $ do Mince A, 4,8 $ do Mince B.</p>
                <p>Pokud ale cena Mince B vzroste na 3 $, její tržní kapitalizace bude 3M $. Dalších 100 $ se pak rozdělí 87 $ do Mince A a 13 $ do Mince B.</p>
