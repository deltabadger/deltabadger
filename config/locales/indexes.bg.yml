bg:
    index:
        bitcoin:
            title: "Bitcoin"
            info: "Редовното инвестиране в Bitcoin е златният стандарт за дългосрочните инвеститори."
        crypto_berbell:
            title: "Крипто щанга"
            info: "Покрийте 74 % от крипто пазара с просто портфолио, което се ребалансира автоматично."
        crypto_index:
            title: "Крипто индекс"
            info: "Крипто S&P 500 не съществува, но вече можете да си го съставите сами. Автоматизирано индексно портфолио от водещите криптовалути."
        altcoin_season:
            title: "Сезон на алткойните"
            info: "Инвестирайте разумно в портфолио от успешни алткойни. Намалете риска от малки криптовалути, като замените ръчното разпределение с автоматично индексиране."
        layer_1:
            title: "Layer 1"
            info: "Основните блокчейн мрежи, които директно обработват транзакции и съставляват фундамента на блокчейн инфраструктурата."
        made_in_usa:
            title: "Made in USA"
            info: "Криптовалути с ясна връзка със Съединените щати чрез екипите на основателите или седалищата на компаниите."
        alleged_sec_securities:
            title: "Обявени за ценни книжа от SEC"
            info: "Токени и криптовалути, които американската Комисия по ценните книжа и борсите (SEC) е обявила за ценни книжа."
        memecoins:
            title: "Мемкойни"
            info: "Монети, чиято стойност произтича от интернет мемове и ентусиазъм на общността, а не от технология или полезност."
        elon_musk_inspired:
            title: "Вдъхновени от Илон Мъск"
            info: "Мем монети, вдъхновени от Илон Мъск. Нито един от тези проекти не е (непременно) подкрепян или създаден от Илон Мъск."
        ai_portfolio:
            title: "AI портфолио"
            info: "Токените за изкуствен интелект (AI) са криптовалути, които захранват проекти, свързани с AI."
        layer_2:
            title: "Layer 2"
            info: "Layer 2 решенията са технологии за мащабиране, изградени върху Layer 1 блокчейни за ускоряване на транзакциите и намаляване на разходите."
        layer_0:
            title: "Layer 0"
            info: "Layer 0 протоколите предоставят базовата инфраструктура за изграждане и свързване на множество блокчейни."
        gamefi:
            title: "GameFi"
            info: "GameFi токените захранват гейминг платформи и виртуални светове на блокчейна, съчетаващи игри с децентрализирани финанси."
        yield_farming:
            title: "Yield Farming"
            info: "Yield farming токените позволяват на потребителите да получават награди за предоставяне на ликвидност на протоколи за децентрализирани финанси."
        consensys_portfolio:
            title: "Портфолио на Consensys"
            info: "Протоколи и токени, в които Consensys е инвестирал."
