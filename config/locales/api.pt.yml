pt:
    bot:
        api:
            public_key_label: Chave API
            private_key_label: Secret API
            whitelist_ip_fallback_html: 'o endereço IP da máquina onde o Deltabadger está instalado. Se estiver num servidor, use o IP público do servidor. Se for o seu computador pessoal, <a href="https://whatismyipaddress.com" target="_blank">verifique o seu IP aqui</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Faça login na sua conta %{exchange_link}.'
                    -   text_html: 'Vá para <a href="https://www.binance.com/pt/my/settings/api-management"><b>Conta</b> → <b>Gestão de API</b></a>.'
                    -   text_html: 'Clique em <b class="pbutton">Criar API</b>.'
                    -   text_html: 'Selecione <b class="pbutton">Gerado pelo sistema</b>.'
                    -   text_html: 'Rotule suas chaves (por exemplo, "deltabadger") e passe pela verificação de segurança se necessário.'
                    -   text_html: 'Clique em <b class="pbutton">Editar restrições</b> no canto superior direito do quadro de chaves.'
                        sub_instructions:
                            -   text_html: "🔘 Restringir o acesso apenas a IPs de confiança: adicione %{whitelist_ip}.<br><strong>⚠️ Importante:</strong> Faça isto primeiro para habilitar o próximo passo."
                            -   text_html: "Marque:<br>☑️ <b>Ativar Leitura</b><br>☑️ <b>Ativar Trading À Vista e de Margem</b>.<br><strong>⚠️ Importante:</strong> As chaves não funcionarão se você adicionar mais permissões."
                    -   text_html: 'Clique em <b>Guardar</b> e passe pela verificação de segurança se necessário.'
                    -   text_html: 'Copie e cole suas novas chaves API acima.'
                private_key: 'Chave Secreta'
                public_key: 'Chave de API'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Faça login na sua conta %{exchange_link}.'
                    -   text_html: 'Selecione o separador <b>More</b> na barra lateral esquerda.'
                    -   text_html: 'Selecione <b>Advanced API</b>.'
                    -   text_html: 'Clique em <b>Create your API key</b>. Se não conseguir encontrá-la, vá diretamente <a href="https://www.coinbase.com/settings/api">aqui</a>.'
                    -   text_html: 'Na caixa de diálogo pop-up, configure:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Dê o seu nome preferido, <b>Deltabadger</b> é bom para reconhecê-la mais tarde.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b>, or the portfolio you want Deltabadger to have access to if not using Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (read-only)'
                                    -   text_html: '<b>Trade</b> (execute trades on your behalf)<br><strong>⚠️ Importante:</strong> As chaves não funcionarão se você adicionar mais permissões.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Adicione %{whitelist_ip}.'
                    -   text_html: 'Clique em <b>Create & download</b> e conclua a verificação em 2 passos.'
                    -   text_html: 'Copie e cole as suas novas chaves de API no formulário acima.'
                private_key: 'Secret'
                public_key: 'API key ID'
            kraken:
                instructions:
                    -   text_html: 'Faça login na sua conta %{exchange_link}.'
                    -   text_html: 'No menu do utilizador, vá para <b>Configurações</b> → <b>Conexões e API</b>.'
                    -   text_html: 'Pressione <b>Criar chave API</b>.'
                    -   text_html: 'Defina permissões para:'
                        sub_instructions:
                            -   text_html: 'Permissões de fundos:'
                                sub_instructions:
                                    -   text_html: '<b>Consulta</b>'
                            -   text_html: 'Ordens e negociações:'
                                sub_instructions:
                                    -   text_html: '<b>Negociações e ordens em aberto da consulta</b>'
                                    -   text_html: '<b>Ordens e negociações encerradas da consulta</b>'
                                    -   text_html: '<b>Criar e modificar ordens</b>'
                                    -   text_html: '<b>Cancelar e encerrar ordens</b><br><strong>⚠️ Importante:</strong> As chaves não funcionarão se você adicionar mais permissões.'
                            -   text_html: 'Restrição de endereço IP:'
                                sub_instructions:
                                    -   text_html: '🔘 Adicione %{whitelist_ip}.'
                    -   text_html: 'Pressione <b>Gerar chave</b>.'
                    -   text_html: 'Copie e cole as suas novas chaves de API no formulário acima.'
                private_key: 'Chave privada'
                public_key: 'Chave API'
            bitget:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bitget.com/account/newapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Select <b>System generated</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Next</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            kucoin:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.kucoin.com/account/api"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger") and set a <b>Passphrase</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>General</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Futures permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your API Key, Secret Key, and Passphrase into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bybit:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.bybit.com/app/user/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create New Key</b>.'
                    -   text_html: 'Select <b>System-generated API Keys</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Read-Only</b>'
                            -   text_html: '☑️ <b>Spot Trading</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw or Derivatives permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Submit</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            mexc:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://www.mexc.com/user/openapi"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Click <b>Create API Key</b>.'
                    -   text_html: 'Label your key (e.g. "Deltabadger").'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View Order Details</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'Link IP Address:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Confirm</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'Secret Key'
                public_key: 'Access Key'
            gemini:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://exchange.gemini.com/settings/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Create a New API Key</b>.'
                    -   text_html: 'Set the key scope to <b>Primary</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>Order Placement</b>'
                            -   text_html: '☑️ <b>Order Status</b>'
                            -   text_html: '☑️ <b>Account Balance</b><br><strong>⚠️ Important:</strong> Do not enable Fund Management or Withdrawal permissions.'
                    -   text_html: 'Click <b>Create API Key</b> and complete the verification.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
            bitvavo:
                instructions:
                    -   text_html: 'Log into your %{exchange_link} account.'
                    -   text_html: 'Go to <a href="https://account.bitvavo.com/user/api"><b>Settings</b> → <b>API</b></a>.'
                    -   text_html: 'Click <b>Generate new key</b>.'
                    -   text_html: 'Set permissions:'
                        sub_instructions:
                            -   text_html: '☑️ <b>View</b>'
                            -   text_html: '☑️ <b>Trade</b><br><strong>⚠️ Important:</strong> Do not enable Withdraw permissions.'
                            -   text_html: 'IP whitelist:'
                                sub_instructions:
                                    -   text_html: '🔘 Whitelist %{whitelist_ip}.'
                    -   text_html: 'Click <b>Generate</b>.'
                    -   text_html: 'Copy and paste your new API keys into the form above.'
                private_key: 'API Secret'
                public_key: 'API Key'
