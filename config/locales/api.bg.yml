bg:
    bot:
        api:
            whitelist_ip_fallback_html: 'IP адреса на компютъра, на който е инсталиран Deltabadger. Ако работи на сървър, използвайте публичния IP на сървъра. Ако е на локалния ви компютър, <a href="https://whatismyipaddress.com" target="_blank">проверете IP адреса си тук</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Влезте в акаунта си в %{exchange_link}.'
                    -   text_html: 'Отидете на <a href="https://www.binance.com/en/my/settings/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Натиснете <b class="pbutton">Create API</b>.'
                    -   text_html: 'Изберете <b class="pbutton">System generated</b>.'
                    -   text_html: 'Дайте име на ключовете (напр. „deltabadger") и при необходимост преминете през проверка за сигурност.'
                    -   text_html: 'Натиснете <b class="pbutton">Edit restrictions</b> в горния десен ъгъл на плочката с ключовете.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: добавете %{whitelist_ip}.<br><strong>⚠️ Важно:</strong> Направете първо тази стъпка, за да се отключи следващата."
                            -   text_html: "Отметнете:<br>☑️ <b>Enable Reading</b><br>☑️ <b>Enable Spot & Margin Trading</b>.<br><strong>⚠️ Важно:</strong> Ключовете няма да работят, ако активирате допълнителни разрешения."
                    -   text_html: 'Натиснете <b>Save</b> и при необходимост преминете през проверка за сигурност.'
                    -   text_html: 'Копирайте и поставете новите си API ключове по-горе.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Влезте в акаунта си в %{exchange_link}.'
                    -   text_html: 'В левия панел изберете раздела <b>More</b>.'
                    -   text_html: 'Изберете <b>Advanced API</b>.'
                    -   text_html: 'Натиснете <b>Create your API key</b>. Ако не можете да го намерите, отидете директно <a href="https://www.coinbase.com/settings/api">тук</a>.'
                    -   text_html: 'В раздела <b>API keys</b> натиснете <b>Create API key</b>.'
                    -   text_html: 'В диалоговия прозорец задайте:'
                        sub_instructions:
                            -   text_html: 'API key nickname'
                                sub_instructions:
                                    -   text_html: 'Изберете произволно име, <b>Deltabadger</b> е подходящо за лесно разпознаване.'
                            -   text_html: 'Portfolio'
                                sub_instructions:
                                    -   text_html: '<b>Default</b> или портфолиото, до което искате Deltabadger да има достъп, ако не използвате Coinbase Portfolios.'
                                    -   text_html: '<b>View</b> (само за четене)'
                                    -   text_html: '<b>Trade</b> (извършване на сделки вместо вас)<br><strong>⚠️ Важно:</strong> Ключовете няма да работят, ако активирате допълнителни разрешения.'
                            -   text_html: 'IP whitelist'
                                sub_instructions:
                                    -   text_html: '🔘 Добавете %{whitelist_ip}.'
                    -   text_html: 'Натиснете <b>Create & download</b> и завършете двуфакторната проверка.'
                    -   text_html: 'Копирайте и поставете новите си API ключове във формуляра по-горе.'
                private_key: 'Secret'
                public_key: 'API key ID'
