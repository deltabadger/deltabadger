                                    -   text_html: '🔘 Pridajte %{whitelist_ip}.'
                    -   text_html: 'Kliknite na <b>Create & download</b> a dokončite dvojfázové overenie.'
                    -   text_html: 'Skopírujte a vložte svoje nové API kľúče do formulára vyššie.'
