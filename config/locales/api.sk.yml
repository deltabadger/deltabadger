sk:
    bot:
        api:
            whitelist_ip_fallback_html: 'IP adresu počítača, na ktorom je Deltabadger nainštalovaný. Ak beží na serveri, použite verejnú IP servera. Ak ide o váš lokálny počítač, <a href="https://whatismyipaddress.com" target="_blank">zistite svoju IP tu</a>'
            binance: &binance_config
                instructions:
                    -   text_html: 'Prihláste sa do svojho účtu na %{exchange_link}.'
                    -   text_html: 'Prejdite na <a href="https://www.binance.com/en/my/settings/api-management"><b>Account</b> → <b>API Management</b></a>.'
                    -   text_html: 'Kliknite na <b class="pbutton">Create API</b>.'
                    -   text_html: 'Vyberte <b class="pbutton">System generated</b>.'
                    -   text_html: 'Pomenujte kľúče (napr. „deltabadger") a v prípade potreby prejdite bezpečnostným overením.'
                    -   text_html: 'Kliknite na <b class="pbutton">Edit restrictions</b> v pravom hornom rohu dlaždice s kľúčmi.'
                        sub_instructions:
                            -   text_html: "🔘 Restrict access to trusted IPs only: pridajte %{whitelist_ip}.<br><strong>⚠️ Dôležité:</strong> Urobte najprv tento krok, aby sa sprístupnil nasledujúci."
                            -   text_html: "Zaškrtnite:<br>☑️ <b>Enable Reading</b><br>☑️ <b>Enable Spot & Margin Trading</b>.<br><strong>⚠️ Dôležité:</strong> Kľúče nebudú fungovať, ak povolíte ďalšie oprávnenia."
                    -   text_html: 'Kliknite na <b>Save</b> a v prípade potreby prejdite bezpečnostným overením.'
                    -   text_html: 'Skopírujte a vložte svoje nové API kľúče vyššie.'
                private_key: 'Secret Key'
                public_key: 'API Key'
            binance_us: *binance_config
            coinbase:
                instructions:
                    -   text_html: 'Prihláste sa do svojho účtu na %{exchange_link}.'
                    -   text_html: 'V ľavom paneli vyberte záložku <b>More</b>.'
                    -   text_html: 'Vyberte <b>Advanced API</b>.'
                    -   text_html: 'Kliknite na <b>Create your API key</b>. Ak ju nemôžete nájsť, prejdite priamo <a href="https://www.coinbase.com/settings/api">sem</a>.'
                    -   text_html: 'Na záložke <b>API keys</b> kliknite na <b>Create API key</b>.'
                    -   text_html: 'V dialógovom okne nastavte:'
