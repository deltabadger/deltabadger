# Solid Queue recurring tasks configuration
# These replace the sidekiq-cron scheduled jobs

production:
  sync_all_tickers_and_assets_job:
    class: Exchange::SyncAllTickersAndAssetsJob
    schedule: "15 */4 * * *"  # every 4 hours at minute 15

  fetch_all_assets_data_from_coingecko_job:
    class: Asset::FetchAllAssetsDataFromCoingeckoJob
    schedule: "20 0 * * *"  # Daily at 00:20 UTC

  # Pulls indices from the market-data source. On hosted containers (deltabadger market data)
  # this syncs ONLY the deltabadger-sourced indices, incl. the Nasdaq stock index; the CoinGecko
  # path is self-hosted only. MUST run after BOTH data-api's Nasdaq refresh (07:30 UTC) and the
  # container's stock-asset sync (10:00) — otherwise hosted containers serve a stale index for a
  # full day (e.g. "Nasdaq 10" the day after a 20-member bump). Cross-repo dependency:
  # deltabadger-data-api config/recurring.yml -> sync_nasdaq_index ("30 7 * * *").
  sync_indices_from_coingecko_job:
    class: Index::SyncFromCoingeckoJob
    schedule: "30 10 * * *"  # Daily at 10:30 UTC (after data-api Nasdaq refresh + stock-asset sync)

  repair_orphaned_bots_job:
    class: Bot::RepairOrphanedBotsJob
    schedule: "*/15 * * * *"  # Every 15 minutes

  sync_alpaca_assets_job:
    class: Exchange::SyncAlpacaAssetsJob
    schedule: "0 3 * * 1"  # At 03:00 UTC on Monday (no-op on hosted; per-user Alpaca sync only)

  # Re-enabled after the 2026-05-28 incident: data-api is FIGI-canonical and the container
  # backfill ships the ambiguity/defensive-skip guards. Runs after data-api's 07:00 UTC sync
  # so containers fetch freshly-synced data. Per-container emergency off:
  # AppConfig.set('stock_sync_enabled', 'false').
  sync_stocks_from_deltabadger_job:
    class: Asset::SyncStocksFromDeltabadgerJob
    schedule: "0 10 * * *"  # Daily at 10:00 UTC (after data-api sync at 07:00)

  evaluate_all_rules_job:
    class: Rule::EvaluateAllJob
    schedule: "0 */4 * * *"  # Every 4 hours

  sync_all_account_transactions_job:
    class: AccountTransaction::SyncAllJob
    schedule: "0 2 * * *"  # Daily at 2 AM

  sync_all_account_balances_job:
    class: AccountBalance::SyncAllJob
    schedule: "30 2 * * *"  # Daily at 2:30 AM (after transactions sync)

  prune_bot_activity_logs_job:
    class: BotActivityLog::PruneJob
    schedule: "0 4 * * *"  # Daily at 04:00 UTC

development:
  sync_all_tickers_and_assets_job:
    class: Exchange::SyncAllTickersAndAssetsJob
    schedule: "15 */4 * * *"  # every 4 hours at minute 15

  fetch_all_assets_data_from_coingecko_job:
    class: Asset::FetchAllAssetsDataFromCoingeckoJob
    schedule: "20 0 * * *"  # Daily at 00:20 UTC

  # Pulls indices from the market-data source. On hosted containers (deltabadger market data)
  # this syncs ONLY the deltabadger-sourced indices, incl. the Nasdaq stock index; the CoinGecko
  # path is self-hosted only. MUST run after BOTH data-api's Nasdaq refresh (07:30 UTC) and the
  # container's stock-asset sync (10:00) — otherwise hosted containers serve a stale index for a
  # full day (e.g. "Nasdaq 10" the day after a 20-member bump). Cross-repo dependency:
  # deltabadger-data-api config/recurring.yml -> sync_nasdaq_index ("30 7 * * *").
  sync_indices_from_coingecko_job:
    class: Index::SyncFromCoingeckoJob
    schedule: "30 10 * * *"  # Daily at 10:30 UTC (after data-api Nasdaq refresh + stock-asset sync)

  repair_orphaned_bots_job:
    class: Bot::RepairOrphanedBotsJob
    schedule: "*/5 * * * *"  # Every 5 minutes for testing

  sync_alpaca_assets_job:
    class: Exchange::SyncAlpacaAssetsJob
    schedule: "0 3 * * 1"  # At 03:00 UTC on Monday (no-op on hosted; per-user Alpaca sync only)

  # Re-enabled after the 2026-05-28 incident (see production block above for rationale).
  sync_stocks_from_deltabadger_job:
    class: Asset::SyncStocksFromDeltabadgerJob
    schedule: "0 10 * * *"  # Daily at 10:00 UTC (after data-api sync at 07:00)

  evaluate_all_rules_job:
    class: Rule::EvaluateAllJob
    schedule: "0 */4 * * *"  # Every 4 hours

  sync_all_account_transactions_job:
    class: AccountTransaction::SyncAllJob
    schedule: "0 2 * * *"  # Daily at 2 AM

  sync_all_account_balances_job:
    class: AccountBalance::SyncAllJob
    schedule: "30 2 * * *"  # Daily at 2:30 AM (after transactions sync)

  prune_bot_activity_logs_job:
    class: BotActivityLog::PruneJob
    schedule: "0 4 * * *"  # Daily at 04:00 UTC
